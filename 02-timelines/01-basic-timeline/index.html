<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Basic Timeline</title>
  <style>
    body {
    padding: 40px;
    background-color: black;
    }



    .box { 
       width: 80px;
       height: 80px;
       margin-bottom: 15px;
       border-radius: 8px;
    }

    .b1 {
        background-color: orange;
    }
    .b2 { 
        background-color: green; 
    }
    .b3 { 
        background-color: yellow; 
    }
  </style>
</head>
<body>
  <div class="box b1"></div>
  <div class="box b2"></div>
  <div class="box b3"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    // Create the timeline
    const tl = gsap.timeline();

    // Chain the tweens. They will play one after another automatically.
    tl.to(".b1", { x: 300, duration: 1 })
      .to(".b2", { x: 300, duration: 1 })
      .to(".b3", { x: 300, duration: 1 });
  </script>
</body>
</html>
