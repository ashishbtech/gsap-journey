<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sequencing</title>
  <style>

    body { 
        padding: 40px; 
        background-color: #111; 
        display: flex; 
        justify-content: center; 
        height: 100vh; 
        align-items: center;
    }

    .card { 
        width: 240px; 
        background-color: #222; 
        border-radius: 12px; 
        padding: 24px; 
        display: flex; 
        flex-direction: column; 
        gap: 15px; 
        visibility: hidden; 
    }

    .title { 
        width: 100%; 
        height: 30px; 
        background-color: #087e8b; 
        border-radius: 4px; 
    }

    .line { 
        width: 100%; 
        height: 15px; 
        background-color: #444; 
        border-radius: 4px; 
    }

    .button { 
        margin-top: 10px; 
        width: 100%; 
        height: 40px; 
        background-color: #ff5a5f; 
        border-radius: 4px; 
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title"></div>
    <div class="line"></div>
    <div class="line"></div>
    <div class="line" style="width: 70%"></div>
    <div class="button"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    // Prevent flash of unstyled content by hiding it in CSS, then making it visible in JS
    gsap.set(".card", { autoAlpha: 1 });

    const tl = gsap.timeline();

    
    tl.from(".card", { 
        y: 50, 
        opacity: 0, 
        duration: 0.8, 
        ease: "power3.out" 
    })
      .from(".title", { 
        x: -30, 
        opacity: 0, 
        duration: 0.5 
    })
      .from(".line", { 
        x: -20, 
        opacity: 0, 
        duration: 0.5, 
        stagger: 0.15 
    })
      .from(".button", { 
        y: 20, 
        opacity: 0, 
        duration: 0.5, 
        ease: "back.out(2)" 
    });
  </script>
</body>
</html>
