<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Overlap Control</title>
  <style>
    body { 
        padding: 50px; 
        background-color: #111; 
    }
    .circle-container { 
        display: flex; 
        gap: 20px; 
    }
    .circle { 
        width: 60px; 
        height: 60px; 
        border-radius: 50%; 
    }
    .c1 { 
        background-color: #ff5a5f; 
    }
    .c2 { 
        background-color: #087e8b; 
    }
    .c3 { 
        background-color: #f5a623; 
    }
    .c4 { 
        background-color: #88ce02; 
    }
  </style>
</head>
<body>
  <div class="circle-container">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
    <div class="circle c4"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const tl = gsap.timeline();

    // Using the position parameter (the string at the end of the tween)
    tl.to(".c1", { y: 200, duration: 1 })
      .to(".c2", { y: 200, duration: 1 }, "-=0.5") // Starts 0.5s before c1 finishes
      .to(".c3", { y: 200, duration: 1 }, "<")     // Starts exactly when c2 starts
      .to(".c4", { y: 200, duration: 1 }, "+=0.5"); // Starts 0.5s after c3 finishes
  </script>
</body>
</html>
