<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Gallery</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white font-sans overflow-x-hidden">
  
  <div class="h-screen flex flex-col items-center justify-center bg-zinc-950">
    <h1 class="text-5xl font-black mb-4 text-orange-500 tracking-tighter">SHINOBI DATABASE</h1>
    <p class="text-zinc-500 tracking-widest text-lg">SCROLL TO REVEAL ROSTER</p>
  </div>

  <div class="min-h-screen py-32 px-10">
    <div class="gallery-grid grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl mx-auto">
      
      <div class="gallery-item w-full h-80 bg-zinc-800 rounded-xl overflow-hidden cursor-pointer opacity-0 translate-y-16">
         <div class="w-full h-full bg-orange-600 hover-target transform scale-100 transition-transform"></div>
      </div>
      <div class="gallery-item w-full h-80 bg-zinc-800 rounded-xl overflow-hidden cursor-pointer opacity-0 translate-y-16">
         <div class="w-full h-full bg-blue-600 hover-target transform scale-100 transition-transform"></div>
      </div>
      <div class="gallery-item w-full h-80 bg-zinc-800 rounded-xl overflow-hidden cursor-pointer opacity-0 translate-y-16">
         <div class="w-full h-full bg-pink-600 hover-target transform scale-100 transition-transform"></div>
      </div>
      <div class="gallery-item w-full h-80 bg-zinc-800 rounded-xl overflow-hidden cursor-pointer opacity-0 translate-y-16">
         <div class="w-full h-full bg-yellow-400 hover-target transform scale-100 transition-transform"></div>
      </div>
      <div class="gallery-item w-full h-80 bg-zinc-800 rounded-xl overflow-hidden cursor-pointer opacity-0 translate-y-16">
         <div class="w-full h-full bg-red-600 hover-target transform scale-100 transition-transform"></div>
      </div>
      <div class="gallery-item w-full h-80 bg-zinc-800 rounded-xl overflow-hidden cursor-pointer opacity-0 translate-y-16">
         <div class="w-full h-full bg-purple-600 hover-target transform scale-100 transition-transform"></div>
      </div>
      
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    
    gsap.to(".gallery-item", {
      scrollTrigger: {
        trigger: ".gallery-grid", 
        start: "top 70%" 
      },
      y: 0,
      opacity: 1,
      duration: 0.8,
      stagger: 0.15, 
      ease: "back.out(1.5)"
    });

   
    const items = document.querySelectorAll(".gallery-item");
    
    items.forEach(item => {
      const target = item.querySelector(".hover-target");
      
      item.addEventListener("mouseenter", () => {
        gsap.to(target, { scale: 1.1, duration: 0.4, ease: "power2.out" });
      });
      
      item.addEventListener("mouseleave", () => {
        gsap.to(target, { scale: 1, duration: 0.4, ease: "power2.out" });
      });
    });
  </script>
</body>
</html>
