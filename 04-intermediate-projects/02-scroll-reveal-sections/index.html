<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scroll Reveal Sections</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden">
  
  <header class="h-screen flex flex-col items-center justify-center">
    <h1 class="text-7xl font-black tracking-tighter text-cyan-700 mb-4">THE NINE REALMS</h1>
    <p class="text-zinc-500 tracking-widest text-lg animate-pulse">SCROLL DOWN TO EXPLORE</p>
  </header>

  <main class="max-w-4xl mx-auto py-24 px-6 space-y-64 mb-64">
    <section class="reveal-section opacity-0 translate-y-24">
      <h2 class="text-5xl font-bold text-cyan-500 mb-6">Midgard</h2>
      <div class="w-full h-64 bg-zinc-800 rounded-lg shadow-2xl"></div>
      <p class="mt-4 text-zinc-400">The realm of humanity, sitting in the middle of the World Tree.</p>
    </section>
    
    <section class="reveal-section opacity-0 translate-y-24">
      <h2 class="text-5xl font-bold text-amber-500 mb-6">Asgard</h2>
      <div class="w-full h-64 bg-zinc-800 rounded-lg shadow-2xl"></div>
      <p class="mt-4 text-zinc-400">The home of the Aesir gods, connected to Midgard by the Bifrost.</p>
    </section>

    <section class="reveal-section opacity-0 translate-y-24">
      <h2 class="text-5xl font-bold text-rose-500 mb-6">Muspelheim</h2>
      <div class="w-full h-64 bg-zinc-800 rounded-lg shadow-2xl"></div>
      <p class="mt-4 text-zinc-400">A primordial realm of fire, guarded by the fire giant Surtr.</p>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

   
    const sections = document.querySelectorAll(".reveal-section");

    
    sections.forEach((section) => {
      gsap.to(section, {
        scrollTrigger: {
          trigger: section,
          start: "top 80%", 
          toggleActions: "play none none reverse" 
        },
        y: 0,
        opacity: 1,
        duration: 1,
        ease: "power3.out"
      });
    });
  </script>
</body>
</html>
