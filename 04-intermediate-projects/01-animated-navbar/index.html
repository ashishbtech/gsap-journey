<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Navbar</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white font-sans overflow-x-hidden">
  
  <nav class="nav-header fixed top-0 left-0 w-full p-6 flex justify-between items-center z-50 mix-blend-difference">
    <div class="text-2xl font-black uppercase tracking-widest cursor-pointer">Letterboxd</div>
    <button class="menu-toggle text-lg font-medium tracking-widest uppercase cursor-pointer z-50">Menu</button>
  </nav>

  <div class="menu-overlay fixed top-0 left-0 w-full h-full bg-zinc-100 text-zinc-900 z-40 flex flex-col justify-center items-center transform -translate-y-full">
    <ul class="text-center space-y-6 text-6xl font-black uppercase tracking-tighter">
      <li class="menu-item opacity-0 translate-y-10 cursor-pointer hover:text-orange-500">Films</li>
      <li class="menu-item opacity-0 translate-y-10 cursor-pointer hover:text-orange-500">Reviews</li>
      <li class="menu-item opacity-0 translate-y-10 cursor-pointer hover:text-orange-500">Lists</li>
      <li class="menu-item opacity-0 translate-y-10 cursor-pointer hover:text-orange-500">Journal</li>
    </ul>
  </div>

  <div class="h-screen flex flex-col items-center justify-center text-zinc-500 border-b border-zinc-800">
    <h1 class="text-4xl font-bold mb-4">SCROLL DOWN</h1>
    <p>Watch the navbar disappear.</p>
  </div>
  <div class="h-screen flex flex-col items-center justify-center text-zinc-500 border-b border-zinc-800">
    <h1 class="text-4xl font-bold mb-4">SCROLL UP</h1>
    <p>Watch the navbar reappear instantly.</p>
  </div>
  <div class="h-screen flex items-center justify-center text-zinc-500">
    <h1 class="text-4xl font-bold">END OF PAGE</h1>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  
  <script>
   
    gsap.registerPlugin(ScrollTrigger);

    const toggleBtn = document.querySelector(".menu-toggle");
    let isOpen = false;
    const tl = gsap.timeline({ paused: true });

    tl.to(".menu-overlay", {
      y: "0%",
      duration: 0.8,
      ease: "power4.inOut"
    }).to(".menu-item", {
      y: 0,
      opacity: 1,
      duration: 0.5,
      stagger: 0.1,
      ease: "power3.out"
    }, "-=0.4");

    toggleBtn.addEventListener("click", () => {
      if (isOpen) {
        tl.reverse();
        toggleBtn.textContent = "Menu";
      } else {
        tl.play();
        toggleBtn.textContent = "Close";
      }
      isOpen = !isOpen;
    });

    const navHeader = document.querySelector(".nav-header");

    ScrollTrigger.create({
      start: "top top", 
      end: "max",       
      onUpdate: (self) => {
        
        if (isOpen) return; 

        if (self.direction === 1) {
         
          gsap.to(navHeader, { yPercent: -100, duration: 0.3, ease: "power2.out" });
        } else {
          
          gsap.to(navHeader, { yPercent: 0, duration: 0.3, ease: "power2.out" });
        }
      }
    });
  </script>
</body>
</html>
