<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Page Transitions</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white font-sans h-screen flex flex-col items-center justify-center overflow-hidden relative">

  <div class="transition-curtain fixed inset-0 bg-orange-500 z-50 origin-top transform scale-y-0"></div>

  <div class="page-content text-center z-10 flex flex-col items-center">
    <h1 class="page-title text-6xl font-black uppercase tracking-widest mb-8">Home Page</h1>
    <button class="nav-btn px-8 py-4 bg-zinc-800 hover:bg-zinc-700 transition-colors rounded uppercase tracking-widest font-bold">
      Go to About Page
    </button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const navBtn = document.querySelector(".nav-btn");
    const pageTitle = document.querySelector(".page-title");
    let isHome = true;

    navBtn.addEventListener("click", () => {
      // Create a timeline for the transition
      const tl = gsap.timeline();

      // 1. Sweep the curtain down (Scale Y from 0 to 1)
      tl.to(".transition-curtain", {
        scaleY: 1,
        transformOrigin: "top",
        duration: 0.6,
        ease: "power4.inOut",
        onComplete: () => {
          // 2. THIS RUNS WHEN CURTAIN IS FULLY DOWN (Screen is covered)
          // Here is where you would normally route to a new page. 
          // We will simulate it by changing the text.
          if (isHome) {
            pageTitle.textContent = "About Page";
            navBtn.textContent = "Go to Home Page";
            document.body.classList.replace("bg-zinc-900", "bg-zinc-950");
          } else {
            pageTitle.textContent = "Home Page";
            navBtn.textContent = "Go to About Page";
            document.body.classList.replace("bg-zinc-950", "bg-zinc-900");
          }
          isHome = !isHome;
        }
      })
      // 3. Sweep the curtain away (Scale Y from 1 to 0, but exiting out the bottom)
      .to(".transition-curtain", {
        scaleY: 0,
        transformOrigin: "bottom",
        duration: 0.6,
        ease: "power4.inOut"
      });
    });
  </script>
</body>
</html>
