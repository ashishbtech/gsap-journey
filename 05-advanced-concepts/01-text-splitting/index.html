<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Splitting</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  /* SplitType wraps lines/words/chars in divs. 
    We add overflow-hidden to the parent 'word' so the 'char' can slide up from underneath it.
  */
  .word { overflow: hidden; }
</style>
</head>
<body class="bg-zinc-950 text-white font-sans h-screen flex flex-col items-center justify-center relative">
  
  <div class="content-wrapper invisible flex flex-col items-center text-center">
    <h1 id="hero-text" class="text-7xl md:text-9xl font-black uppercase tracking-tighter text-orange-500">
      Awaken Your<br>Sharingan
    </h1>
    
    <p id="sub-text" class="mt-8 text-zinc-400 tracking-widest text-lg uppercase">
      Master the art of illusion
    </p>

    <button id="replay-btn" class="mt-12 px-6 py-2 border border-zinc-700 hover:bg-zinc-800 rounded uppercase tracking-widest text-sm opacity-0">
      Replay Animation
    </button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://unpkg.com/split-type@0.3.4/umd/index.min.js"></script>
  
  <script>
    // 1. Split the text
    const text = new SplitType('#hero-text', { types: 'words, chars' });

    // 2. Set initial states
    gsap.set('.content-wrapper', { autoAlpha: 1 }); // Unhide the wrapper securely
    gsap.set(text.chars, { yPercent: 115 }); // Push characters down securely
    gsap.set('#sub-text', { opacity: 0, y: 20 }); 

    // 3. Create Timeline
    const tl = gsap.timeline();

    tl.to(text.chars, {
      yPercent: 0,
      stagger: 0.05,
      duration: 0.8,
      ease: "back.out(1.2)"
    })
    .to('#sub-text', {
      opacity: 1,
      y: 0,
      duration: 1,
      ease: "power2.out"
    }, "-=0.4")
    .to('#replay-btn', {
      opacity: 1,
      duration: 0.5
    });

    // 4. Replay functionality
    document.getElementById('replay-btn').addEventListener('click', () => {
      tl.restart(); // The beauty of timelines! One command resets and replays everything.
    });
  </script>
</body>
</html>
