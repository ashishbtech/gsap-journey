<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ScrollTrigger Basic</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white font-sans overflow-x-hidden">
  <div class="h-screen flex items-center justify-center text-4xl tracking-widest font-bold text-zinc-600">
    SCROLL DOWN
  </div>
  
  <div class="h-screen flex items-center justify-start pl-20">
    <div class="reveal-text text-8xl font-black text-orange-500 opacity-0 tracking-tighter">
      HIDDEN LEAF
    </div>
  </div>
  
  <div class="h-screen"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
    
    gsap.registerPlugin(ScrollTrigger);

    gsap.to(".reveal-text", {
      scrollTrigger: {
        trigger: ".reveal-text",
        start: "top 80%"
      },
      x: 100,
      opacity: 1,
      duration: 1.5,
      ease: "power4.out"
    });
  </script>
</body>
</html>
