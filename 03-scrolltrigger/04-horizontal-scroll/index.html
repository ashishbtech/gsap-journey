<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Horizontal Scroll</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .hide-scroll::-webkit-scrollbar { display: none; }
</style>
</head>
<body class="bg-zinc-900 text-white overflow-x-hidden hide-scroll">
  <div class="h-screen flex items-center justify-center text-4xl text-zinc-600 tracking-widest">
    ENTER THE REALMS
  </div>

  <div class="horizontal-wrapper overflow-hidden h-screen flex">
    <div class="horizontal-container flex w-[400vw] h-full">
      <div class="w-screen h-full flex items-center justify-center bg-zinc-800 text-8xl font-black text-cyan-500">MIDGARD</div>
      <div class="w-screen h-full flex items-center justify-center bg-zinc-700 text-8xl font-black text-emerald-500">ALFHEIM</div>
      <div class="w-screen h-full flex items-center justify-center bg-zinc-600 text-8xl font-black text-amber-500">ASGARD</div>
      <div class="w-screen h-full flex items-center justify-center bg-zinc-500 text-8xl font-black text-rose-500">JOTUNHEIM</div>
    </div>
  </div>

  <div class="h-screen flex items-center justify-center text-4xl text-zinc-600 tracking-widest">
    JOURNEY COMPLETE
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);
    
    const container = document.querySelector(".horizontal-container");
    
    gsap.to(container, {
      x: () => -(container.scrollWidth - window.innerWidth) + "px",
      ease: "none",
      scrollTrigger: {
        trigger: ".horizontal-wrapper",
        pin: true,
        start: "top top",
        end: () => "+=" + container.scrollWidth,
        scrub: 1,
        invalidateOnRefresh: true
      }
    });
  </script>
</body>
</html>
